<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beating Heart — Violet</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Raleway:wght@200;300&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --violet:   #7b2fff;
    --deep:     #3a006f;
    --lavender: #c084fc;
    --magenta:  #d946ef;
    --glow:     #a855f7;
    --bg:       #04000d;
    --pulse:    1.0s;
  }

  body {
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Raleway', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Deep purple ambient bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 50%, #1a0040 0%, #04000d 100%);
    pointer-events: none;
  }

  /* Starfield */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: #fff;
    animation: twinkle ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.1; transform: scale(1); }
    50%       { opacity: 0.9; transform: scale(1.4); }
  }

  /* Floating orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(60px);
    pointer-events: none;
    animation: orbFloat ease-in-out infinite;
  }
  .orb1 { width: 300px; height: 300px; background: rgba(123,47,255,0.18); top: -80px; left: -80px; animation-duration: 9s; }
  .orb2 { width: 250px; height: 250px; background: rgba(217,70,239,0.14); bottom: -60px; right: -60px; animation-duration: 11s; animation-delay: 2s; }
  .orb3 { width: 200px; height: 200px; background: rgba(168,85,247,0.12); top: 40%; left: 15%; animation-duration: 13s; animation-delay: 4s; }

  @keyframes orbFloat {
    0%, 100% { transform: translate(0,0) scale(1); }
    50%       { transform: translate(30px, -30px) scale(1.1); }
  }

  /* ── Scene ── */
  .scene {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 36px;
  }

  .title {
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(192,132,252,0.45);
  }

  /* ── Heart ── */
  .heart-wrap {
    position: relative;
    width: 290px;
    height: 290px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Outer glow bloom */
  .heart-wrap::before {
    content: '';
    position: absolute;
    inset: -40px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(123,47,255,0.4) 0%, rgba(217,70,239,0.15) 45%, transparent 70%);
    animation: bloomPulse var(--pulse) ease-in-out infinite;
  }
  @keyframes bloomPulse {
    0%, 100% { transform: scale(0.85); opacity: 0.5; }
    35%       { transform: scale(1.3);  opacity: 1.0; }
    60%       { transform: scale(1.05); opacity: 0.65; }
  }

  #heart {
    width: 265px;
    height: 265px;
    filter:
      drop-shadow(0 0 22px rgba(168,85,247,0.9))
      drop-shadow(0 0 55px rgba(123,47,255,0.55))
      drop-shadow(0 0 90px rgba(217,70,239,0.3));
    animation: heartbeat var(--pulse) ease-in-out infinite;
    transform-origin: center;
    cursor: pointer;
  }

  @keyframes heartbeat {
    0%   { transform: scale(1.00); }
    14%  { transform: scale(1.23); }
    28%  { transform: scale(1.06); }
    42%  { transform: scale(1.19); }
    70%  { transform: scale(1.00); }
    100% { transform: scale(1.00); }
  }

  /* Shockwaves */
  .shockwave {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid rgba(192,132,252,0.7);
    animation: shockwave var(--pulse) ease-out infinite;
    pointer-events: none;
  }
  .shockwave:nth-child(2) {
    animation-delay: 0.09s;
    border-color: rgba(217,70,239,0.45);
  }
  .shockwave:nth-child(3) {
    animation-delay: 0.18s;
    border-color: rgba(123,47,255,0.25);
  }
  @keyframes shockwave {
    0%   { transform: scale(0.55); opacity: 1.0; }
    100% { transform: scale(2.6);  opacity: 0.0; }
  }

  /* ── EKG ── */
  .ekg-wrap {
    width: 360px;
    height: 72px;
    position: relative;
  }
  .ekg-line { width: 100%; height: 100%; overflow: visible; }

  /* Grid lines behind EKG */
  .ekg-grid line {
    stroke: rgba(123,47,255,0.12);
    stroke-width: 0.5;
  }

  .ekg-path {
    fill: none;
    stroke: url(#ekgGrad);
    stroke-width: 2.2;
    stroke-linecap: round;
    stroke-linejoin: round;
    filter: drop-shadow(0 0 6px var(--magenta)) drop-shadow(0 0 2px #fff);
    stroke-dasharray: 620;
    stroke-dashoffset: 620;
    animation: drawEKG var(--pulse) ease-in-out infinite;
  }
  @keyframes drawEKG {
    0%   { stroke-dashoffset: 620; opacity: 1;   }
    80%  { stroke-dashoffset: 0;   opacity: 1;   }
    92%  { stroke-dashoffset: 0;   opacity: 0.3; }
    100% { stroke-dashoffset: 620; opacity: 0;   }
  }

  /* Glowing scan dot */
  .scan-dot {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--lavender);
    top: 50%; transform: translateY(-50%);
    box-shadow: 0 0 10px var(--glow), 0 0 20px var(--magenta);
    animation: scanDot var(--pulse) ease-in-out infinite;
  }
  @keyframes scanDot {
    0%   { left: 0%;   opacity: 0; }
    5%   { opacity: 1; }
    95%  { opacity: 0.8; }
    100% { left: 100%; opacity: 0; }
  }

  /* ── BPM ── */
  .bpm-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .bpm-num {
    font-family: 'Cinzel', serif;
    font-size: 5rem;
    font-weight: 600;
    line-height: 1;
    letter-spacing: -3px;
    color: #fff;
    text-shadow:
      0 0 15px var(--lavender),
      0 0 35px var(--violet),
      0 0 60px rgba(217,70,239,0.5);
    animation: numPop var(--pulse) ease-in-out infinite;
  }
  @keyframes numPop {
    0%, 20%, 100% { opacity: 1; }
    14%           { opacity: 0.55; }
  }
  .bpm-label {
    font-size: 0.85rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(192,132,252,0.6);
    padding-bottom: 10px;
  }

  /* ── Status tags ── */
  .status-row {
    display: flex;
    gap: 12px;
  }
  .tag {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid rgba(123,47,255,0.4);
    color: rgba(192,132,252,0.7);
    background: rgba(123,47,255,0.1);
    transition: all 0.3s;
  }
  .tag.active {
    border-color: var(--lavender);
    color: #fff;
    background: rgba(123,47,255,0.3);
    box-shadow: 0 0 10px rgba(123,47,255,0.4);
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    gap: 18px;
    align-items: center;
  }
  .ctrl-label {
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(192,132,252,0.4);
  }

  .speed-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 180px;
    height: 3px;
    background: linear-gradient(to right, var(--deep), var(--magenta));
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }
  .speed-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--lavender);
    box-shadow: 0 0 10px var(--glow), 0 0 20px rgba(217,70,239,0.6);
    cursor: pointer;
    transition: transform 0.1s;
  }
  .speed-slider::-webkit-slider-thumb:hover { transform: scale(1.3); }

  /* ── BGM Bar ── */
  .bgm-bar {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 20px;
    border-radius: 40px;
    border: 1px solid rgba(123,47,255,0.35);
    background: rgba(10,0,30,0.6);
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(123,47,255,0.15);
  }

  .bgm-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(123,47,255,0.25);
    border: 1px solid rgba(192,132,252,0.4);
    border-radius: 30px;
    padding: 6px 14px;
    color: var(--lavender);
    font-family: 'Raleway', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .bgm-btn:hover {
    background: rgba(123,47,255,0.45);
    box-shadow: 0 0 14px rgba(123,47,255,0.5);
    color: #fff;
  }
  .bgm-btn.playing {
    background: rgba(217,70,239,0.25);
    border-color: var(--magenta);
    color: #fff;
    box-shadow: 0 0 16px rgba(217,70,239,0.4);
  }

  .bgm-vol-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .vol-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 80px;
    height: 3px;
    background: linear-gradient(to right, var(--violet), var(--magenta));
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  .vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--lavender);
    box-shadow: 0 0 6px var(--glow);
    cursor: pointer;
  }

  .bgm-track {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: rgba(192,132,252,0.45);
    white-space: nowrap;
  }

  /* Visualizer bars */
  .viz {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 20px;
  }
  .viz-bar {
    width: 3px;
    background: linear-gradient(to top, var(--violet), var(--magenta));
    border-radius: 2px;
    animation: vizAnim 0.5s ease-in-out infinite alternate;
    box-shadow: 0 0 4px rgba(168,85,247,0.5);
  }
  @keyframes vizAnim {
    from { transform: scaleY(0.15); }
    to   { transform: scaleY(1.0);  }
  }

  .hint {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: rgba(192,132,252,0.25);
    text-transform: uppercase;
    animation: hintFade 3s ease-in-out infinite;
  }
  @keyframes hintFade {
    0%, 100% { opacity: 0.3; }
    50%       { opacity: 0.7; }
  }
</style>
</head>
<body>

<!-- Starfield -->
<div class="stars" id="stars"></div>

<!-- Ambient orbs -->
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="scene">

  <p class="title">Cor Immortale &nbsp;·&nbsp; Immortal Heart</p>

  <!-- Heart -->
  <div class="heart-wrap">
    <div class="shockwave"></div>
    <div class="shockwave"></div>
    <div class="shockwave"></div>

    <svg id="heart" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Main fill gradient -->
        <radialGradient id="hg" cx="50%" cy="38%" r="65%">
          <stop offset="0%"   stop-color="#e879f9"/>
          <stop offset="30%"  stop-color="#a855f7"/>
          <stop offset="70%"  stop-color="#6d28d9"/>
          <stop offset="100%" stop-color="#1e0050"/>
        </radialGradient>
        <!-- Shimmer overlay -->
        <radialGradient id="hShimmer" cx="35%" cy="28%" r="40%">
          <stop offset="0%"   stop-color="rgba(255,255,255,0.4)"/>
          <stop offset="100%" stop-color="transparent"/>
        </radialGradient>
        <!-- Edge darken -->
        <radialGradient id="hEdge" cx="50%" cy="50%" r="55%">
          <stop offset="60%"  stop-color="transparent"/>
          <stop offset="100%" stop-color="rgba(10,0,30,0.6)"/>
        </radialGradient>
        <!-- Veins / lines filter -->
        <filter id="softBlur">
          <feGaussianBlur stdDeviation="1.2"/>
        </filter>
        <filter id="glow">
          <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Shadow -->
      <path filter="url(#softBlur)" fill="rgba(50,0,100,0.6)"
        d="M50 86 C50 86 8 57 8 34 C8 18 21 10 34 17 C40 20 46 27 50 34
           C54 27 60 20 66 17 C79 10 92 18 92 34 C92 57 50 86 50 86 Z"
        transform="translate(2,3)"/>

      <!-- Main heart -->
      <path fill="url(#hg)"
        d="M50 86 C50 86 8 57 8 34 C8 18 21 10 34 17 C40 20 46 27 50 34
           C54 27 60 20 66 17 C79 10 92 18 92 34 C92 57 50 86 50 86 Z"/>

      <!-- Edge vignette -->
      <path fill="url(#hEdge)"
        d="M50 86 C50 86 8 57 8 34 C8 18 21 10 34 17 C40 20 46 27 50 34
           C54 27 60 20 66 17 C79 10 92 18 92 34 C92 57 50 86 50 86 Z"/>

      <!-- Highlight -->
      <path fill="url(#hShimmer)"
        d="M50 86 C50 86 8 57 8 34 C8 18 21 10 34 17 C40 20 46 27 50 34
           C54 27 60 20 66 17 C79 10 92 18 92 34 C92 57 50 86 50 86 Z"/>

      <!-- Specular spots -->
      <ellipse cx="34" cy="28" rx="7" ry="4.5" fill="rgba(255,230,255,0.28)" transform="rotate(-25,34,28)"/>
      <ellipse cx="29" cy="26" rx="2" ry="1.2" fill="rgba(255,255,255,0.55)" transform="rotate(-20,29,26)"/>

      <!-- Inner pulse line (vein look) -->
      <path filter="url(#glow)" fill="none" stroke="rgba(232,121,249,0.35)" stroke-width="1"
        d="M50 75 C42 65 20 52 18 38 C16 28 22 22 30 24"/>
    </svg>
  </div>

  <!-- EKG -->
  <div class="ekg-wrap">
    <div class="scan-dot"></div>
    <svg class="ekg-line" viewBox="0 0 360 72" preserveAspectRatio="none">
      <defs>
        <linearGradient id="ekgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="#a855f7"/>
          <stop offset="50%"  stop-color="#e879f9"/>
          <stop offset="100%" stop-color="#a855f7"/>
        </linearGradient>
        <!-- Subtle grid -->
        <pattern id="grid" width="18" height="18" patternUnits="userSpaceOnUse">
          <path d="M 18 0 L 0 0 0 18" fill="none" stroke="rgba(123,47,255,0.12)" stroke-width="0.5"/>
        </pattern>
      </defs>

      <!-- Grid background -->
      <rect width="360" height="72" fill="url(#grid)" opacity="0.7"/>

      <!-- Center baseline -->
      <line x1="0" y1="36" x2="360" y2="36" stroke="rgba(123,47,255,0.2)" stroke-width="0.5" stroke-dasharray="4 4"/>

      <!-- EKG trace -->
      <path class="ekg-path"
        d="M0,36
           L45,36
           L55,30 L63,36
           L80,36
           L92,36
           L100,8 L107,65 L114,36
           L132,36
           L142,27 L150,36
           L185,36
           L195,30 L203,36
           L225,36
           L237,36
           L245,8 L252,65 L259,36
           L277,36
           L287,27 L295,36
           L360,36"/>
    </svg>
  </div>

  <!-- BPM -->
  <div class="bpm-row">
    <span class="bpm-num" id="bpmDisplay">72</span>
    <span class="bpm-label">BPM</span>
  </div>

  <!-- Status tags -->
  <div class="status-row" id="statusRow">
    <div class="tag" id="tagRest">Resting</div>
    <div class="tag active" id="tagNorm">Normal</div>
    <div class="tag" id="tagElev">Elevated</div>
    <div class="tag" id="tagMax">Max</div>
  </div>

  <!-- Slider -->
  <div class="controls">
    <span class="ctrl-label">Rate</span>
    <input type="range" class="speed-slider" id="speedSlider" min="30" max="200" value="72">
    <span class="ctrl-label" id="bpmLive">72 bpm</span>
  </div>

  <p class="hint">Click the heart to stress test</p>

  <!-- BGM Control -->
  <div class="bgm-bar">
    <button class="bgm-btn" id="bgmBtn" title="Play BGM">
      <svg id="iconPlay" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      <svg id="iconPause" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      <span id="bgmLabel">Play BGM</span>
    </button>
    <div class="bgm-vol-wrap">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="rgba(192,132,252,0.5)"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      <input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="55">
    </div>
    <span class="bgm-track">♪ Ethereal Pulse</span>
  </div>

</div>

<script>
  /* ── Starfield ── */
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      left:${Math.random()*100}%;top:${Math.random()*100}%;
      width:${sz}px;height:${sz}px;
      animation-duration:${Math.random()*4+2}s;
      animation-delay:${Math.random()*5}s;
    `;
    starsEl.appendChild(s);
  }

  /* ── BPM control ── */
  const slider     = document.getElementById('speedSlider');
  const bpmDisplay = document.getElementById('bpmDisplay');
  const bpmLive    = document.getElementById('bpmLive');
  const root       = document.documentElement;

  const tags = {
    tagRest: [30, 59],
    tagNorm: [60, 99],
    tagElev: [100, 149],
    tagMax:  [150, 200],
  };

  function updateTags(bpm) {
    for (const [id, range] of Object.entries(tags)) {
      const el = document.getElementById(id);
      el.classList.toggle('active', bpm >= range[0] && bpm <= range[1]);
    }
  }

  function updateBPM(val) {
    const bpm = parseInt(val);
    root.style.setProperty('--pulse', (60 / bpm).toFixed(3) + 's');
    bpmDisplay.textContent = bpm;
    bpmLive.textContent = bpm + ' bpm';
    updateTags(bpm);
  }

  slider.addEventListener('input', e => updateBPM(e.target.value));

  /* ── Web Audio BGM ── */
  let actx = null, masterGain = null, isPlaying = false;
  let oscillators = [], lfoNodes = [], heartbeatNodes = [];

  function createBGM() {
    actx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = actx.createGain();
    masterGain.gain.setValueAtTime(0.55, actx.currentTime);
    masterGain.connect(actx.destination);

    const reverb = actx.createConvolver();
    const reverbLen = actx.sampleRate * 3;
    const reverbBuf = actx.createBuffer(2, reverbLen, actx.sampleRate);
    for (let c = 0; c < 2; c++) {
      const d = reverbBuf.getChannelData(c);
      for (let i = 0; i < reverbLen; i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/reverbLen, 2.5);
    }
    reverb.buffer = reverbBuf;
    reverb.connect(masterGain);

    const reverbGain = actx.createGain();
    reverbGain.gain.setValueAtTime(0.45, actx.currentTime);
    reverbGain.connect(reverb);

    const dryGain = actx.createGain();
    dryGain.gain.setValueAtTime(0.55, actx.currentTime);
    dryGain.connect(masterGain);

    // Chord: Am add9 → F → C → G (looping ambient)
    const chords = [
      [220.00, 261.63, 293.66, 329.63],  // Am9
      [174.61, 220.00, 261.63, 349.23],  // F
      [261.63, 329.63, 392.00, 523.25],  // C
      [196.00, 246.94, 293.66, 392.00],  // G
    ];

    let chordIdx = 0;
    const chordDuration = 4.0;

    function playChord(time, freqs) {
      freqs.forEach((freq, i) => {
        const osc = actx.createOscillator();
        osc.type = i % 2 === 0 ? 'sine' : 'triangle';
        osc.frequency.setValueAtTime(freq, time);

        // Slight detune for warmth
        osc.detune.setValueAtTime((Math.random()-0.5)*8, time);

        const env = actx.createGain();
        env.gain.setValueAtTime(0, time);
        env.gain.linearRampToValueAtTime(0.06, time + 0.5);
        env.gain.linearRampToValueAtTime(0.04, time + chordDuration - 0.3);
        env.gain.linearRampToValueAtTime(0, time + chordDuration + 0.5);

        // LFO vibrato
        const lfo = actx.createOscillator();
        lfo.frequency.setValueAtTime(0.3 + i*0.07, time);
        const lfoGain = actx.createGain();
        lfoGain.gain.setValueAtTime(2, time);
        lfo.connect(lfoGain);
        lfoGain.connect(osc.frequency);

        osc.connect(env);
        env.connect(dryGain);
        env.connect(reverbGain);

        osc.start(time);
        osc.stop(time + chordDuration + 0.6);
        lfo.start(time);
        lfo.stop(time + chordDuration + 0.6);
      });
    }

    // Sub bass drone
    const bass = actx.createOscillator();
    bass.type = 'sine';
    bass.frequency.setValueAtTime(55, actx.currentTime);
    const bassGain = actx.createGain();
    bassGain.gain.setValueAtTime(0.07, actx.currentTime);
    const bassFilter = actx.createBiquadFilter();
    bassFilter.type = 'lowpass';
    bassFilter.frequency.setValueAtTime(120, actx.currentTime);
    bass.connect(bassFilter);
    bassFilter.connect(bassGain);
    bassGain.connect(masterGain);
    bass.start();
    oscillators.push(bass);

    // Pad shimmer (high freq triangle layer)
    const shimmer = actx.createOscillator();
    shimmer.type = 'triangle';
    shimmer.frequency.setValueAtTime(880, actx.currentTime);
    const shimGain = actx.createGain();
    shimGain.gain.setValueAtTime(0.015, actx.currentTime);
    const shimLFO = actx.createOscillator();
    shimLFO.frequency.setValueAtTime(0.12, actx.currentTime);
    const shimLFOGain = actx.createGain();
    shimLFOGain.gain.setValueAtTime(0.012, actx.currentTime);
    shimLFO.connect(shimLFOGain);
    shimLFOGain.connect(shimGain.gain);
    shimmer.connect(shimGain);
    shimGain.connect(reverbGain);
    shimmer.start();
    shimLFO.start();
    oscillators.push(shimmer, shimLFO);

    // ── Realistic lub-dub heartbeat ──
    function makeToneBurst(time, freq, freqEnd, duration, gainPeak, isLub) {
      const sr = actx.sampleRate;
      const len = Math.floor(sr * duration);
      const buf = actx.createBuffer(1, len, sr);
      const d = buf.getChannelData(0);

      // Sine sweep with natural decay
      for (let i = 0; i < len; i++) {
        const t2 = i / sr;
        const freqNow = freq + (freqEnd - freq) * (i / len);
        const phase = 2 * Math.PI * freqNow * t2;
        // Envelope: quick attack, slower exponential decay
        const attack = Math.min(1, i / (sr * 0.006));
        const decay  = Math.exp(-t2 * (isLub ? 18 : 22));
        d[i] = Math.sin(phase) * attack * decay;

        // Add subharmonic body resonance
        const subPhase = 2 * Math.PI * (freqNow * 0.5) * t2;
        d[i] += Math.sin(subPhase) * attack * decay * 0.4;

        // Tiny noise component for chest thud texture
        d[i] += (Math.random() * 2 - 1) * decay * 0.08;
      }

      const src = actx.createBufferSource();
      src.buffer = buf;

      // Bandpass shaped for cardiac thump (40–200 Hz range)
      const bp = actx.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.setValueAtTime(isLub ? 65 : 48, time);
      bp.Q.setValueAtTime(isLub ? 0.9 : 0.7, time);

      // Low shelf boost for extra body
      const shelf = actx.createBiquadFilter();
      shelf.type = 'lowshelf';
      shelf.frequency.setValueAtTime(80, time);
      shelf.gain.setValueAtTime(9, time);

      const env = actx.createGain();
      env.gain.setValueAtTime(gainPeak, time);

      src.connect(bp);
      bp.connect(shelf);
      shelf.connect(env);
      env.connect(masterGain);
      src.start(time);
    }

    function heartThump(time) {
      const bpm = parseInt(slider.value);
      const interval = 60 / bpm;

      // S1 — "LUB": mitral/tricuspid valve closure, low thud ~60–80 Hz
      makeToneBurst(time,        72, 48, 0.14, 1.1,  true);
      // S2 — "DUB": aortic/pulmonary valve closure, slightly higher & shorter
      makeToneBurst(time + 0.19, 90, 55, 0.10, 0.75, false);

      // Subtle S3 (physiological filling gallop) for realism — very quiet
      makeToneBurst(time + 0.38, 45, 35, 0.07, 0.12, false);

      return time + interval;
    }

    // Scheduler
    let nextBeat = actx.currentTime + 0.1;
    let nextChordTime = actx.currentTime;
    let localChordIdx = 0;

    const scheduleId = setInterval(() => {
      if (!isPlaying) return;
      const now = actx.currentTime;

      // Schedule heartbeat thuds
      while (nextBeat < now + 0.3) {
        nextBeat = heartThump(nextBeat);
      }

      // Schedule chords
      if (now >= nextChordTime - 0.1) {
        playChord(nextChordTime, chords[localChordIdx % chords.length]);
        localChordIdx++;
        nextChordTime += chordDuration;
      }
    }, 50);

    window._bgmScheduler = scheduleId;
  }

  function stopBGM() {
    clearInterval(window._bgmScheduler);
    oscillators.forEach(o => { try { o.stop(); } catch(e){} });
    oscillators = [];
    if (actx) { actx.close(); actx = null; }
  }

  /* ── BGM Button ── */
  const bgmBtn   = document.getElementById('bgmBtn');
  const iconPlay = document.getElementById('iconPlay');
  const iconPause= document.getElementById('iconPause');
  const bgmLabel = document.getElementById('bgmLabel');
  const volSlider= document.getElementById('volSlider');

  // Add visualizer to BGM bar
  const vizDiv = document.createElement('div');
  vizDiv.className = 'viz';
  vizDiv.style.display = 'none';
  for (let i = 0; i < 7; i++) {
    const bar = document.createElement('div');
    bar.className = 'viz-bar';
    bar.style.animationDelay = (i * 0.07) + 's';
    bar.style.animationDuration = (0.35 + Math.random()*0.3) + 's';
    bar.style.height = '20px';
    vizDiv.appendChild(bar);
  }
  document.querySelector('.bgm-bar').insertBefore(vizDiv, document.querySelector('.bgm-track'));

  bgmBtn.addEventListener('click', () => {
    if (!isPlaying) {
      isPlaying = true;
      createBGM();
      bgmBtn.classList.add('playing');
      iconPlay.style.display  = 'none';
      iconPause.style.display = '';
      bgmLabel.textContent    = 'Pause';
      vizDiv.style.display    = 'flex';
    } else {
      isPlaying = false;
      stopBGM();
      bgmBtn.classList.remove('playing');
      iconPlay.style.display  = '';
      iconPause.style.display = 'none';
      bgmLabel.textContent    = 'Play BGM';
      vizDiv.style.display    = 'none';
    }
  });

  volSlider.addEventListener('input', e => {
    const vol = e.target.value / 100;
    if (masterGain) masterGain.gain.setValueAtTime(vol, actx.currentTime);
  });


  /* ── Click heart → stress spike ── */
  document.getElementById('heart').addEventListener('click', () => {
    const base   = parseInt(slider.value);
    const target = Math.min(base + 40, 200);
    let current  = base;
    const up = setInterval(() => {
      current = Math.min(current + 8, target);
      slider.value = current;
      updateBPM(current);
      if (current >= target) {
        clearInterval(up);
        const down = setInterval(() => {
          current = Math.max(current - 4, base);
          slider.value = current;
          updateBPM(current);
          if (current <= base) clearInterval(down);
        }, 250);
      }
    }, 60);
  });
</script>
</body>
